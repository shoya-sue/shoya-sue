name: Update README with Weekly Activity

on:
  schedule:
    # Run every Sunday at 00:00 UTC (09:00 JST)
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run mode (preview changes without writing)'
        required: false
        type: boolean
        default: false

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: scripts/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('scripts/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: |
          cd scripts
          npm ci --omit=dev

      - name: Save README before update
        run: cp README.md README.md.bak

      - name: Update README
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          cd scripts
          node update-readme.js

      - name: Show diff
        if: always()
        run: |
          echo "--- README Diff ---"
          diff README.md.bak README.md || true
          rm -f README.md.bak

      - name: Validate markers still intact
        run: |
          echo "Validating markers..."
          missing=""
          if ! grep -q '<!-- WEEKLY_ACTIVITY_START -->' README.md; then
            missing="$missing WEEKLY_ACTIVITY_START"
          fi
          if ! grep -q '<!-- WEEKLY_ACTIVITY_END -->' README.md; then
            missing="$missing WEEKLY_ACTIVITY_END"
          fi
          if [ -n "$missing" ]; then
            echo "::error::Missing markers:$missing"
            exit 1
          fi
          echo "All markers intact ✅"

      - name: Check health report
        if: always()
        run: |
          if [ -f health-report.json ]; then
            echo "::warning::External service health issues detected"
            cat health-report.json
            rm -f health-report.json
          fi

      - name: Commit and push changes
        if: ${{ inputs.dry_run != true }}
        run: |
          git config --local user.email "shoya-sue@users.noreply.github.com"
          git config --local user.name "shoya-sue"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Update weekly activity stats"
            git push
          fi

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `⚠️ README auto-update failed (${new Date().toISOString().split('T')[0]})`;
            const body = [
              '## README Auto-Update Failure',
              '',
              `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Triggered by:** ${context.eventName}`,
              `**Time:** ${new Date().toISOString()}`,
              '',
              'Please check the workflow logs for details.',
            ].join('\n');

            // Check if a similar open issue already exists
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'readme-bot',
            });

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['readme-bot', 'bug'],
              });
              console.log('Created failure issue');
            } else {
              // Add comment to existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `Re-failed at ${new Date().toISOString()}\n\n[Workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              });
              console.log('Added comment to existing issue');
            }
